<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SSOMA – Gestión de Compras</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; }
    ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #64748b; }
    body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useMemo } = React;

    // ═══════════════════════════════════════════════════════════════════════════
    //  CONFIGURACIÓN: Las 7 etapas del flujo de compras SSOMA
    // ═══════════════════════════════════════════════════════════════════════════
    const STAGES = [
      { id: 0, key: 'necesidad',      label: 'Necesidad',               icon: '📋', desc: 'Identificación y registro de la necesidad.' },
      { id: 1, key: 'requerimientos', label: 'Armado de Requerimientos', icon: '📝', desc: 'Especificaciones técnicas y cantidades.' },
      { id: 2, key: 'precios',        label: 'Precios',                  icon: '💰', desc: 'Estimación del presupuesto inicial.' },
      { id: 3, key: 'proveedores',    label: 'Proveedores',              icon: '🏢', desc: 'Búsqueda y recepción de propuestas.' },
      { id: 4, key: 'comparativo',    label: 'Comparativo',              icon: '⚖️', desc: 'Elaboración y aprobación del cuadro comparativo.' },
      { id: 5, key: 'solicitud',      label: 'Solicitud',                icon: '📤', desc: 'Generación de la orden interna de compra.' },
      { id: 6, key: 'procura',        label: 'Procura',                  icon: '✅', desc: 'Subida al sistema general de compras/procura.', final: true },
    ];

    const URGENCY_CFG = {
      Alta:  { label: 'Alta',  cls: 'bg-red-100 text-red-700 border-red-200',     dot: 'bg-red-500' },
      Media: { label: 'Media', cls: 'bg-amber-100 text-amber-700 border-amber-200', dot: 'bg-amber-500' },
      Baja:  { label: 'Baja',  cls: 'bg-sky-100 text-sky-700 border-sky-200',     dot: 'bg-sky-500' },
    };

    // ═══════════════════════════════════════════════════════════════════════════
    //  DATOS DE EJEMPLO  (reemplazar con llamada a Google Sheets API)
    // ═══════════════════════════════════════════════════════════════════════════
    const INITIAL_PURCHASES = [
      {
        id: 'SSOMA-REQ-001',
        title: 'EPPs para trabajo en altura',
        urgency: 'Alta',
        stage: 4,           // ← Ejemplo en Comparativo (paso 5 visual)
        responsible: 'Carlos Mendoza',
        createdAt: '2026-03-10',
        notes: {
          0: 'Se identificó la necesidad de EPPs para el equipo de mantenimiento en techos.',
          1: 'Se requieren: 15 arneses de seguridad, 15 cascos con barbiquejo y 30 m de línea de vida.',
          2: 'Presupuesto estimado: S/ 8,500.',
          3: 'Proveedores contactados: Seguridad Total SAC, ProEPP Perú, SafeWork.',
          4: 'En evaluación del cuadro comparativo. ProEPP Perú ofrece mejor relación calidad/precio a S/ 7,900.',
          5: '', 6: '',
        },
      },
      {
        id: 'SSOMA-REQ-002',
        title: 'Señalización de áreas de riesgo – Planta 2',
        urgency: 'Media',
        stage: 2,
        responsible: 'Ana Torres',
        createdAt: '2026-03-15',
        notes: {
          0: 'Auditoría interna detectó falta de señalización en 5 zonas de Planta 2.',
          1: '20 señales de piso, 8 letreros de advertencia y 4 conos de seguridad.',
          2: 'Buscando cotizaciones. Presupuesto referencial: S/ 1,200.',
          3: '', 4: '', 5: '', 6: '',
        },
      },
      {
        id: 'SSOMA-REQ-003',
        title: 'Capacitación en primeros auxilios',
        urgency: 'Media',
        stage: 6,
        responsible: 'Luis García',
        createdAt: '2026-02-20',
        notes: {
          0: 'Requisito legal: capacitación anual en primeros auxilios para 45 trabajadores.',
          1: 'Capacitación de 16 horas para 45 personas, incluye materiales y certificados.',
          2: 'Presupuesto aprobado: S/ 6,750.',
          3: 'Proveedor seleccionado: Cruz Roja Peruana.',
          4: 'Cuadro comparativo aprobado por Jefatura.',
          5: 'Orden de compra OC-2026-0082 emitida.',
          6: 'Cargado al sistema de procura. Código: PROC-2026-0145. PROCESO FINALIZADO.',
        },
      },
      {
        id: 'SSOMA-REQ-004',
        title: 'Extintores PQS 6kg – Almacén Central',
        urgency: 'Alta',
        stage: 5,
        responsible: 'María Quispe',
        createdAt: '2026-03-01',
        notes: {
          0: 'Vencimiento de 12 extintores en almacén central el 15 de abril.',
          1: '12 extintores PQS 6kg con instalación y capacitación de uso incluida.',
          2: 'Cotización inicial: S/ 2,160.',
          3: 'Proveedores: Extintores Lima, FireSafe Perú, Seguridad Industrial SAC.',
          4: 'Cuadro comparativo aprobado. Ganador: FireSafe Perú – S/ 1,980.',
          5: 'Solicitud SC-2026-055 enviada a Administración. En espera de aprobación.',
          6: '',
        },
      },
      {
        id: 'SSOMA-REQ-005',
        title: 'Software de gestión de incidentes',
        urgency: 'Baja',
        stage: 1,
        responsible: 'Carlos Mendoza',
        createdAt: '2026-03-28',
        notes: {
          0: 'Necesidad de digitalizar el registro de incidentes y seguimiento de acciones correctivas.',
          1: 'Definiendo módulos: registro de incidentes, seguimiento de acciones, reportes automáticos.',
          2: '', 3: '', 4: '', 5: '', 6: '',
        },
      },
      {
        id: 'SSOMA-REQ-006',
        title: 'Botiquines de primeros auxilios – Oficinas',
        urgency: 'Baja',
        stage: 0,
        responsible: 'Ana Torres',
        createdAt: '2026-04-01',
        notes: {
          0: 'Inspección rutinaria identificó 4 botiquines con insumos vencidos o agotados en pisos 2 y 3.',
          1: '', 2: '', 3: '', 4: '', 5: '', 6: '',
        },
      },
    ];

    // ═══════════════════════════════════════════════════════════════════════════
    //  HELPERS
    // ═══════════════════════════════════════════════════════════════════════════
    const stageStatus = (itemStage, cellIdx) => {
      if (cellIdx < itemStage) return 'completed';
      if (cellIdx === itemStage) return 'current';
      return 'pending';
    };

    const progressPct = (stage) => Math.round((stage / (STAGES.length - 1)) * 100);

    let nextId = INITIAL_PURCHASES.length + 1;
    const genId = () => `SSOMA-REQ-${String(nextId++).padStart(3, '0')}`;

    // ═══════════════════════════════════════════════════════════════════════════
    //  COMPONENTES REUTILIZABLES
    // ═══════════════════════════════════════════════════════════════════════════

    function UrgencyBadge({ urgency }) {
      const cfg = URGENCY_CFG[urgency] || URGENCY_CFG.Baja;
      return (
        <span className={`inline-flex items-center gap-1.5 px-2 py-0.5 rounded-full text-xs font-semibold border ${cfg.cls}`}>
          <span className={`w-1.5 h-1.5 rounded-full ${cfg.dot}`} />
          {urgency}
        </span>
      );
    }

    function ProgressBar({ stage }) {
      const pct = progressPct(stage);
      const color = stage === 6 ? 'bg-emerald-500'
                  : stage >= 4 ? 'bg-blue-500'
                  : stage >= 2 ? 'bg-indigo-400'
                  : 'bg-slate-400';
      return (
        <div className="w-full min-w-[160px]">
          <div className="flex justify-between items-center mb-1">
            <span className="text-xs text-slate-500 truncate max-w-[120px]">{STAGES[stage].label}</span>
            <span className="text-xs font-bold text-slate-600 ml-2">{pct}%</span>
          </div>
          <div className="h-2 bg-slate-200 rounded-full overflow-hidden">
            <div
              className={`h-full rounded-full transition-all duration-700 ${color}`}
              style={{ width: pct + '%' }}
            />
          </div>
        </div>
      );
    }

    // ── Stepper horizontal completo ──────────────────────────────────────────
    function Stepper({ stage }) {
      return (
        <div className="w-full overflow-x-auto">
          <div className="flex items-start min-w-[560px]">
            {STAGES.map((s, idx) => {
              const status = stageStatus(stage, idx);
              const isLast = idx === STAGES.length - 1;
              return (
                <React.Fragment key={s.id}>
                  <div className="flex flex-col items-center flex-shrink-0" style={{ width: '80px' }}>
                    {/* Círculo */}
                    <div className={`
                      w-10 h-10 rounded-full flex items-center justify-center font-bold text-sm transition-all
                      ${status === 'completed' ? 'bg-emerald-500 text-white shadow-md' : ''}
                      ${status === 'current'   ? 'bg-blue-600 text-white shadow-lg ring-4 ring-blue-100' : ''}
                      ${status === 'pending'   ? 'bg-slate-200 text-slate-400' : ''}
                    `}>
                      {status === 'completed' ? '✓' : idx + 1}
                    </div>
                    {/* Etiqueta */}
                    <div className="mt-2 text-center">
                      <span className="text-lg">{s.icon}</span>
                      <p className={`text-[11px] font-semibold leading-tight mt-0.5
                        ${status === 'current'   ? 'text-blue-700' : ''}
                        ${status === 'completed' ? 'text-emerald-700' : ''}
                        ${status === 'pending'   ? 'text-slate-400' : ''}
                      `}>{s.label}</p>
                      {status === 'current' && (
                        <span className="inline-block mt-1 px-1.5 py-0.5 bg-blue-100 text-blue-600 text-[9px] rounded-full font-bold uppercase tracking-wide">
                          Actual
                        </span>
                      )}
                    </div>
                  </div>
                  {/* Línea conectora */}
                  {!isLast && (
                    <div className={`flex-1 h-0.5 mt-5 mx-1
                      ${status === 'completed' ? 'bg-emerald-400' : 'bg-slate-200'}
                    `} />
                  )}
                </React.Fragment>
              );
            })}
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════════════════
    //  MODAL DE DETALLE
    // ═══════════════════════════════════════════════════════════════════════════
    function DetailModal({ purchase, onClose, onAdvance }) {
      const [tab, setTab] = useState('stepper');
      const [noteInput, setNoteInput] = useState('');
      const canAdvance = purchase.stage < 6;

      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4" onClick={onClose}>
          <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" />
          <div
            className="relative bg-white rounded-2xl shadow-2xl w-full max-w-3xl max-h-[92vh] flex flex-col"
            onClick={e => e.stopPropagation()}
          >
            {/* ── Cabecera del modal ── */}
            <div className="bg-gradient-to-r from-slate-900 to-slate-700 text-white p-6 rounded-t-2xl flex-shrink-0">
              <div className="flex items-start justify-between gap-4">
                <div className="flex-1 min-w-0">
                  <div className="flex flex-wrap items-center gap-2 mb-2">
                    <code className="text-slate-400 text-xs bg-slate-800 px-2 py-0.5 rounded">{purchase.id}</code>
                    <UrgencyBadge urgency={purchase.urgency} />
                  </div>
                  <h2 className="text-xl font-bold leading-snug">{purchase.title}</h2>
                  <div className="flex flex-wrap items-center gap-4 mt-2 text-slate-300 text-sm">
                    <span>👤 {purchase.responsible}</span>
                    <span>📅 {purchase.createdAt}</span>
                    <span>📊 Paso {purchase.stage + 1} / {STAGES.length}</span>
                  </div>
                </div>
                <button
                  onClick={onClose}
                  className="text-slate-400 hover:text-white transition-colors text-2xl leading-none flex-shrink-0"
                  title="Cerrar"
                >✕</button>
              </div>
            </div>

            {/* ── Tabs ── */}
            <div className="flex gap-1 px-6 pt-4 pb-0 bg-white border-b border-slate-100 flex-shrink-0">
              {[['stepper', '📊 Progreso'], ['notes', '📒 Notas por Etapa']].map(([key, label]) => (
                <button key={key} onClick={() => setTab(key)}
                  className={`px-4 py-2 text-sm font-medium rounded-t-lg border-b-2 transition-all -mb-px
                    ${tab === key
                      ? 'border-blue-600 text-blue-700 bg-blue-50/50'
                      : 'border-transparent text-slate-500 hover:text-slate-700'}
                  `}>{label}
                </button>
              ))}
            </div>

            {/* ── Cuerpo scrollable ── */}
            <div className="overflow-y-auto flex-1 p-6">

              {/* ─ TAB: STEPPER ─ */}
              {tab === 'stepper' && (
                <>
                  <div className="mb-8 px-2">
                    <Stepper stage={purchase.stage} />
                  </div>

                  {/* Tarjetas de etapa */}
                  <div className="space-y-2">
                    {STAGES.map((s, idx) => {
                      const status = stageStatus(purchase.stage, idx);
                      return (
                        <div key={s.id} className={`rounded-xl border p-4 transition-all
                          ${status === 'current'   ? 'border-blue-300 bg-blue-50 shadow-sm' : ''}
                          ${status === 'completed' ? 'border-emerald-200 bg-emerald-50/60' : ''}
                          ${status === 'pending'   ? 'border-slate-200 bg-slate-50/80' : ''}
                        `}>
                          <div className="flex items-start gap-3">
                            <div className={`w-8 h-8 rounded-full flex items-center justify-center text-sm font-bold flex-shrink-0 mt-0.5
                              ${status === 'completed' ? 'bg-emerald-500 text-white' : ''}
                              ${status === 'current'   ? 'bg-blue-600 text-white' : ''}
                              ${status === 'pending'   ? 'bg-slate-300 text-slate-500' : ''}
                            `}>
                              {status === 'completed' ? '✓' : idx + 1}
                            </div>
                            <div className="flex-1 min-w-0">
                              <div className="flex flex-wrap items-center gap-2 mb-1">
                                <span className="text-base">{s.icon}</span>
                                <span className={`font-semibold text-sm
                                  ${status === 'current'   ? 'text-blue-800' : ''}
                                  ${status === 'completed' ? 'text-emerald-800' : ''}
                                  ${status === 'pending'   ? 'text-slate-400' : ''}
                                `}>{s.label}</span>
                                {status === 'current' && (
                                  <span className="px-2 py-0.5 bg-blue-200 text-blue-800 text-xs rounded-full font-semibold">Etapa actual</span>
                                )}
                                {status === 'completed' && (
                                  <span className="px-2 py-0.5 bg-emerald-200 text-emerald-800 text-xs rounded-full font-semibold">Completada</span>
                                )}
                                {status === 'pending' && (
                                  <span className="px-2 py-0.5 bg-slate-200 text-slate-500 text-xs rounded-full">Pendiente</span>
                                )}
                              </div>
                              <p className="text-xs text-slate-500 mb-1 italic">{s.desc}</p>
                              {purchase.notes[idx] && (
                                <p className="text-sm text-slate-700 bg-white/70 rounded-lg px-3 py-2 border border-slate-200 mt-2">
                                  {purchase.notes[idx]}
                                </p>
                              )}
                            </div>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </>
              )}

              {/* ─ TAB: NOTAS ─ */}
              {tab === 'notes' && (
                <div className="space-y-4">
                  {STAGES.map((s, idx) => {
                    const status = stageStatus(purchase.stage, idx);
                    const isPending = status === 'pending';
                    return (
                      <div key={s.id} className={`rounded-xl border p-4
                        ${status === 'current'   ? 'border-blue-200 bg-blue-50' : ''}
                        ${status === 'completed' ? 'border-emerald-200 bg-white' : ''}
                        ${isPending             ? 'border-dashed border-slate-200 opacity-50' : ''}
                      `}>
                        <div className="flex items-center gap-2 mb-2">
                          <span className="text-lg">{s.icon}</span>
                          <span className="font-semibold text-sm text-slate-700">{s.label}</span>
                          {status === 'completed' && <span className="ml-auto text-emerald-600 text-xs font-medium">✓ Completada</span>}
                          {status === 'current'   && <span className="ml-auto text-blue-600 text-xs font-medium">● Etapa actual</span>}
                          {isPending              && <span className="ml-auto text-slate-400 text-xs">Pendiente</span>}
                        </div>
                        <p className="text-sm text-slate-600">
                          {purchase.notes[idx]
                            ? purchase.notes[idx]
                            : <span className="italic text-slate-400">Sin notas registradas para esta etapa.</span>
                          }
                        </p>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>

            {/* ── Footer de acción ── */}
            <div className="flex-shrink-0 px-6 py-4 border-t border-slate-200 bg-slate-50 rounded-b-2xl flex items-center justify-between gap-4">
              <div className="text-sm text-slate-500">
                <span className="font-medium text-slate-700">{STAGES[purchase.stage].icon} {STAGES[purchase.stage].label}</span>
                {' '}— Etapa {purchase.stage + 1} de {STAGES.length}
              </div>
              {canAdvance ? (
                <button
                  onClick={() => onAdvance(purchase.id)}
                  className="flex items-center gap-2 px-5 py-2.5 bg-blue-600 hover:bg-blue-700 active:scale-95 text-white font-semibold rounded-xl shadow-md transition-all"
                >
                  Avanzar a "{STAGES[purchase.stage + 1].label}" →
                </button>
              ) : (
                <div className="flex items-center gap-2 px-5 py-2.5 bg-emerald-100 text-emerald-800 font-semibold rounded-xl border border-emerald-200">
                  ✅ Proceso completado en Procura
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════════════════
    //  VISTA TABLA
    // ═══════════════════════════════════════════════════════════════════════════
    function TableView({ purchases, onSelect }) {
      if (purchases.length === 0) return null;
      return (
        <div className="overflow-x-auto rounded-2xl border border-slate-200 shadow-sm">
          <table className="w-full text-sm border-collapse">
            <thead>
              <tr className="bg-slate-800 text-slate-200 text-left">
                <th className="px-4 py-3 font-semibold rounded-tl-2xl whitespace-nowrap">ID</th>
                <th className="px-4 py-3 font-semibold">Título</th>
                <th className="px-4 py-3 font-semibold whitespace-nowrap">Urgencia</th>
                <th className="px-4 py-3 font-semibold whitespace-nowrap">Responsable</th>
                <th className="px-4 py-3 font-semibold whitespace-nowrap">Creado</th>
                <th className="px-4 py-3 font-semibold min-w-[180px]">Progreso</th>
                <th className="px-4 py-3 font-semibold rounded-tr-2xl"></th>
              </tr>
            </thead>
            <tbody>
              {purchases.map((p, i) => (
                <tr
                  key={p.id}
                  className={`border-b border-slate-100 hover:bg-blue-50 cursor-pointer transition-colors
                    ${i % 2 === 0 ? 'bg-white' : 'bg-slate-50/60'}
                  `}
                  onClick={() => onSelect(p)}
                >
                  <td className="px-4 py-3">
                    <code className="text-xs text-slate-500 bg-slate-100 px-2 py-0.5 rounded">{p.id}</code>
                  </td>
                  <td className="px-4 py-3 font-medium text-slate-800 max-w-xs">
                    <span className="line-clamp-2">{p.title}</span>
                  </td>
                  <td className="px-4 py-3"><UrgencyBadge urgency={p.urgency} /></td>
                  <td className="px-4 py-3 text-slate-600 whitespace-nowrap">{p.responsible}</td>
                  <td className="px-4 py-3 text-slate-500 whitespace-nowrap text-xs">{p.createdAt}</td>
                  <td className="px-4 py-3"><ProgressBar stage={p.stage} /></td>
                  <td className="px-4 py-3">
                    <button
                      onClick={e => { e.stopPropagation(); onSelect(p); }}
                      className="px-3 py-1.5 bg-blue-600 hover:bg-blue-700 text-white text-xs font-semibold rounded-lg transition-colors whitespace-nowrap"
                    >
                      Ver detalle →
                    </button>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════════════════
    //  VISTA KANBAN
    // ═══════════════════════════════════════════════════════════════════════════
    function KanbanCard({ purchase, onSelect }) {
      return (
        <div
          onClick={() => onSelect(purchase)}
          className="bg-white rounded-xl border border-slate-200 p-3 shadow-sm hover:shadow-md hover:border-blue-300 transition-all cursor-pointer group"
        >
          <div className="flex items-start justify-between gap-1 mb-2">
            <code className="text-[10px] text-slate-400 bg-slate-100 px-1.5 py-0.5 rounded">{purchase.id}</code>
            <UrgencyBadge urgency={purchase.urgency} />
          </div>
          <p className="text-xs font-semibold text-slate-800 leading-snug mb-3 group-hover:text-blue-700 transition-colors">
            {purchase.title}
          </p>
          <div className="flex items-center justify-between text-[11px] text-slate-500 pt-2 border-t border-slate-100">
            <span title={purchase.responsible}>👤 {purchase.responsible.split(' ')[0]}</span>
            <span>📅 {purchase.createdAt.slice(5)}</span>
          </div>
        </div>
      );
    }

    function KanbanView({ purchases, onSelect }) {
      return (
        <div className="flex gap-3 overflow-x-auto pb-4">
          {STAGES.map((s) => {
            const cards = purchases.filter(p => p.stage === s.id);
            const isFinal = s.id === 6;
            return (
              <div key={s.id} className="flex-shrink-0 w-52">
                {/* Cabecera columna */}
                <div className={`rounded-t-xl px-3 py-2.5 flex items-center gap-2
                  ${isFinal ? 'bg-emerald-700' : 'bg-slate-700'}
                `}>
                  <span className="text-base">{s.icon}</span>
                  <span className="text-white text-xs font-semibold flex-1 truncate">{s.label}</span>
                  <span className={`text-xs font-bold px-2 py-0.5 rounded-full
                    ${isFinal
                      ? 'bg-emerald-600 text-emerald-100'
                      : 'bg-slate-600 text-slate-200'}
                  `}>{cards.length}</span>
                </div>
                {/* Cuerpo columna */}
                <div className="bg-slate-100 rounded-b-xl min-h-[200px] p-2 space-y-2">
                  {cards.length === 0
                    ? <p className="text-[11px] text-slate-400 text-center mt-6 italic select-none">Sin solicitudes</p>
                    : cards.map(p => <KanbanCard key={p.id} purchase={p} onSelect={onSelect} />)
                  }
                </div>
              </div>
            );
          })}
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════════════════
    //  TARJETAS DE ESTADÍSTICAS
    // ═══════════════════════════════════════════════════════════════════════════
    function StatsBar({ purchases }) {
      const total     = purchases.length;
      const completed = purchases.filter(p => p.stage === 6).length;
      const inProcess = total - completed;
      const urgAlta   = purchases.filter(p => p.urgency === 'Alta' && p.stage < 6).length;
      const avgPct    = total > 0
        ? Math.round(purchases.reduce((a, p) => a + progressPct(p.stage), 0) / total)
        : 0;

      const stats = [
        { label: 'Total Solicitudes', value: total,             icon: '📋', color: 'from-slate-700 to-slate-800' },
        { label: 'En Progreso',       value: inProcess,         icon: '🔄', color: 'from-blue-600 to-blue-700' },
        { label: 'Finalizadas',       value: completed,         icon: '✅', color: 'from-emerald-600 to-emerald-700' },
        { label: 'Urgencia Alta',     value: urgAlta,           icon: '🔴', color: 'from-red-600 to-red-700' },
        { label: 'Avance Promedio',   value: avgPct + '%',      icon: '📈', color: 'from-indigo-600 to-indigo-700' },
      ];

      return (
        <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 gap-3 mb-6">
          {stats.map(s => (
            <div key={s.label} className={`rounded-2xl p-4 bg-gradient-to-br ${s.color} text-white shadow-md`}>
              <div className="flex items-center gap-2 mb-2 opacity-90">
                <span className="text-xl">{s.icon}</span>
                <span className="text-xs font-medium leading-tight">{s.label}</span>
              </div>
              <p className="text-3xl font-extrabold tracking-tight">{s.value}</p>
            </div>
          ))}
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════════════════
    //  FORMULARIO NUEVA SOLICITUD
    // ═══════════════════════════════════════════════════════════════════════════
    function NewPurchaseModal({ onClose, onSave }) {
      const [form, setForm] = useState({
        title: '', urgency: 'Media', responsible: '', notes0: '',
      });
      const set = (k, v) => setForm(f => ({ ...f, [k]: v }));
      const valid = form.title.trim() && form.responsible.trim();

      const handleSave = () => {
        if (!valid) return;
        const today = new Date().toISOString().slice(0, 10);
        onSave({
          id: genId(),
          title: form.title.trim(),
          urgency: form.urgency,
          stage: 0,
          responsible: form.responsible.trim(),
          createdAt: today,
          notes: { 0: form.notes0.trim(), 1:'', 2:'', 3:'', 4:'', 5:'', 6:'' },
        });
        onClose();
      };

      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4" onClick={onClose}>
          <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" />
          <div className="relative bg-white rounded-2xl shadow-2xl w-full max-w-lg" onClick={e => e.stopPropagation()}>
            <div className="bg-gradient-to-r from-blue-700 to-blue-600 text-white p-5 rounded-t-2xl flex items-center justify-between">
              <h2 className="text-lg font-bold">+ Nueva Solicitud de Compra</h2>
              <button onClick={onClose} className="text-blue-200 hover:text-white text-xl">✕</button>
            </div>
            <div className="p-6 space-y-4">
              <div>
                <label className="block text-xs font-semibold text-slate-600 mb-1">Título de la compra *</label>
                <input
                  type="text"
                  placeholder="Ej: EPPs para trabajo en caliente"
                  value={form.title}
                  onChange={e => set('title', e.target.value)}
                  className="w-full border border-slate-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                />
              </div>
              <div className="grid grid-cols-2 gap-4">
                <div>
                  <label className="block text-xs font-semibold text-slate-600 mb-1">Urgencia</label>
                  <select
                    value={form.urgency}
                    onChange={e => set('urgency', e.target.value)}
                    className="w-full border border-slate-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                  >
                    <option>Alta</option>
                    <option>Media</option>
                    <option>Baja</option>
                  </select>
                </div>
                <div>
                  <label className="block text-xs font-semibold text-slate-600 mb-1">Responsable *</label>
                  <input
                    type="text"
                    placeholder="Nombre completo"
                    value={form.responsible}
                    onChange={e => set('responsible', e.target.value)}
                    className="w-full border border-slate-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
                  />
                </div>
              </div>
              <div>
                <label className="block text-xs font-semibold text-slate-600 mb-1">Descripción de la necesidad</label>
                <textarea
                  rows={3}
                  placeholder="Detalle la necesidad identificada..."
                  value={form.notes0}
                  onChange={e => set('notes0', e.target.value)}
                  className="w-full border border-slate-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none"
                />
              </div>
            </div>
            <div className="px-6 pb-6 flex gap-3 justify-end">
              <button onClick={onClose} className="px-4 py-2 text-sm text-slate-600 hover:text-slate-800 font-medium rounded-xl border border-slate-200 hover:bg-slate-50 transition-colors">
                Cancelar
              </button>
              <button
                onClick={handleSave}
                disabled={!valid}
                className={`px-5 py-2 text-sm font-semibold rounded-xl transition-all
                  ${valid
                    ? 'bg-blue-600 hover:bg-blue-700 text-white shadow-md active:scale-95'
                    : 'bg-slate-200 text-slate-400 cursor-not-allowed'}
                `}
              >
                Crear Solicitud
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ═══════════════════════════════════════════════════════════════════════════
    //  APP PRINCIPAL
    // ═══════════════════════════════════════════════════════════════════════════
    function App() {
      const [purchases, setPurchases]   = useState(INITIAL_PURCHASES);
      const [selected,  setSelected]    = useState(null);
      const [showNew,   setShowNew]     = useState(false);
      const [view,      setView]        = useState('table');   // 'table' | 'kanban'
      const [filterUrgency, setFilterUrgency] = useState('all');
      const [filterStage,   setFilterStage]   = useState('all');
      const [search, setSearch] = useState('');

      // ── Filtrado ────────────────────────────────────────────────────────────
      const filtered = useMemo(() => purchases
        .filter(p => filterUrgency === 'all' || p.urgency === filterUrgency)
        .filter(p => filterStage   === 'all' || p.stage === Number(filterStage))
        .filter(p =>
          p.title.toLowerCase().includes(search.toLowerCase()) ||
          p.id.toLowerCase().includes(search.toLowerCase()) ||
          p.responsible.toLowerCase().includes(search.toLowerCase())
        ),
      [purchases, filterUrgency, filterStage, search]);

      // ── Handlers ────────────────────────────────────────────────────────────
      const handleAdvance = (id) => {
        setPurchases(prev => prev.map(p =>
          p.id === id && p.stage < 6 ? { ...p, stage: p.stage + 1 } : p
        ));
        setSelected(prev =>
          prev && prev.id === id ? { ...prev, stage: Math.min(prev.stage + 1, 6) } : prev
        );
      };

      const handleNewSave = (newP) => {
        setPurchases(prev => [newP, ...prev]);
      };

      // ── Render ──────────────────────────────────────────────────────────────
      return (
        <div className="min-h-screen bg-slate-50">

          {/* ── NAVBAR ── */}
          <nav className="bg-slate-900 text-white px-6 py-4 flex items-center gap-4 shadow-lg sticky top-0 z-40">
            <div className="flex items-center gap-3">
              <div className="w-10 h-10 bg-gradient-to-br from-blue-500 to-blue-600 rounded-xl flex items-center justify-center font-extrabold text-white text-sm shadow-lg">
                S
              </div>
              <div>
                <p className="font-bold text-sm leading-tight">SSOMA</p>
                <p className="text-slate-400 text-xs">Gestión de Compras</p>
              </div>
            </div>
            <div className="hidden md:flex items-center gap-1 ml-6 text-slate-400 text-sm">
              <span>Dashboard</span>
              <span className="mx-2 text-slate-600">›</span>
              <span className="text-white font-medium">Solicitudes</span>
            </div>
            <div className="ml-auto flex items-center gap-3">
              <span className="hidden md:block text-slate-500 text-xs">Hoy: {new Date().toLocaleDateString('es-PE')}</span>
              <div className="w-8 h-8 bg-blue-600 rounded-full flex items-center justify-center text-xs font-bold" title="Usuario actual">
                U
              </div>
            </div>
          </nav>

          <div className="max-w-screen-xl mx-auto px-4 md:px-6 py-6">

            {/* ── ENCABEZADO ── */}
            <div className="flex items-start justify-between gap-4 mb-6">
              <div>
                <h1 className="text-2xl font-extrabold text-slate-800">Panel de Compras</h1>
                <p className="text-slate-500 text-sm mt-1">
                  Seguimiento de solicitudes del departamento SSOMA · {purchases.length} registros
                </p>
              </div>
              <button
                onClick={() => setShowNew(true)}
                className="flex-shrink-0 flex items-center gap-2 px-4 py-2.5 bg-blue-600 hover:bg-blue-700 text-white text-sm font-semibold rounded-xl shadow-md transition-all active:scale-95"
              >
                + Nueva Solicitud
              </button>
            </div>

            {/* ── ESTADÍSTICAS ── */}
            <StatsBar purchases={purchases} />

            {/* ── CONTROLES DE FILTRO ── */}
            <div className="flex flex-col md:flex-row gap-3 mb-4">

              {/* Búsqueda */}
              <div className="relative flex-1">
                <span className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">🔍</span>
                <input
                  type="text"
                  placeholder="Buscar por título, ID o responsable…"
                  value={search}
                  onChange={e => setSearch(e.target.value)}
                  className="w-full pl-9 pr-4 py-2.5 border border-slate-200 rounded-xl text-sm bg-white shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                />
              </div>

              {/* Filtro urgencia */}
              <div className="flex gap-1 bg-white border border-slate-200 rounded-xl p-1 shadow-sm">
                {[['all','Todos'],['Alta','Alta'],['Media','Media'],['Baja','Baja']].map(([v, l]) => (
                  <button key={v} onClick={() => setFilterUrgency(v)}
                    className={`px-3 py-1.5 rounded-lg text-xs font-medium transition-all
                      ${filterUrgency === v ? 'bg-slate-800 text-white shadow' : 'text-slate-500 hover:text-slate-700'}
                    `}>{l}
                  </button>
                ))}
              </div>

              {/* Filtro etapa */}
              <select
                value={filterStage}
                onChange={e => setFilterStage(e.target.value)}
                className="border border-slate-200 rounded-xl px-3 py-2 text-xs bg-white shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500"
              >
                <option value="all">Todas las etapas</option>
                {STAGES.map(s => (
                  <option key={s.id} value={s.id}>{s.icon} {s.label}</option>
                ))}
              </select>

              {/* Toggle vista */}
              <div className="flex gap-1 bg-white border border-slate-200 rounded-xl p-1 shadow-sm">
                <button onClick={() => setView('table')}
                  className={`px-3 py-1.5 rounded-lg text-xs font-medium transition-all
                    ${view === 'table' ? 'bg-slate-800 text-white shadow' : 'text-slate-500 hover:text-slate-700'}
                  `}>☰ Tabla
                </button>
                <button onClick={() => setView('kanban')}
                  className={`px-3 py-1.5 rounded-lg text-xs font-medium transition-all
                    ${view === 'kanban' ? 'bg-slate-800 text-white shadow' : 'text-slate-500 hover:text-slate-700'}
                  `}>⊞ Kanban
                </button>
              </div>
            </div>

            {/* ── VISTAS ── */}
            {view === 'table'
              ? <TableView purchases={filtered} onSelect={setSelected} />
              : <KanbanView purchases={filtered} onSelect={setSelected} />
            }

            {/* Estado vacío */}
            {filtered.length === 0 && (
              <div className="text-center py-20 text-slate-400">
                <p className="text-5xl mb-4">🔎</p>
                <p className="font-semibold text-slate-600">No se encontraron solicitudes</p>
                <p className="text-sm mt-1">Prueba ajustando los filtros o el término de búsqueda</p>
              </div>
            )}

            {/* ── LEYENDA DE ETAPAS (footer) ── */}
            <div className="mt-8 p-4 bg-white rounded-2xl border border-slate-200 shadow-sm">
              <p className="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">Referencia de Etapas</p>
              <div className="flex flex-wrap gap-2">
                {STAGES.map(s => (
                  <div key={s.id} className="flex items-center gap-1.5 px-3 py-1.5 bg-slate-50 rounded-full border border-slate-200 text-xs text-slate-600">
                    <span className="w-4 h-4 rounded-full bg-slate-300 text-white flex items-center justify-center text-[10px] font-bold">
                      {s.id + 1}
                    </span>
                    <span>{s.icon}</span>
                    <span className="font-medium">{s.label}</span>
                  </div>
                ))}
              </div>
              <div className="flex flex-wrap gap-4 mt-3 text-xs text-slate-500">
                <span className="flex items-center gap-1.5"><span className="w-3 h-3 rounded-full bg-emerald-500"></span> Completada</span>
                <span className="flex items-center gap-1.5"><span className="w-3 h-3 rounded-full bg-blue-600"></span> Etapa actual</span>
                <span className="flex items-center gap-1.5"><span className="w-3 h-3 rounded-full bg-slate-300"></span> Pendiente</span>
              </div>
            </div>
          </div>

          {/* ── MODALES ── */}
          {selected && (
            <DetailModal
              purchase={selected}
              onClose={() => setSelected(null)}
              onAdvance={handleAdvance}
            />
          )}
          {showNew && (
            <NewPurchaseModal
              onClose={() => setShowNew(false)}
              onSave={handleNewSave}
            />
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
